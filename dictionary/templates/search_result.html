<!DOCTYPE html>
<html lang="eng">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=devive-width, initial-scale="1.0">
        <title>Search Result</title>
    </head>
    <body>
        <h1>Search Result</h1>
        {% if word %}
            <p><strong>Word:</strong>{{word}}</p>
            <p><strong>Meaning:</strong>{{meaning}}</p>
        {% else %}
            <p>NO word found</p>
        {% endif %}
